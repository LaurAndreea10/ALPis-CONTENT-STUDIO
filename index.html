<html lang="ro">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALPis — Content Studio</title>

<style>
:root{
  --bg:#08080e;--card:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.05);
  --t1:#fff;--t2:rgba(255,255,255,0.6);--t3:rgba(255,255,255,0.3);--t4:rgba(255,255,255,0.12);
  --accent:#ff3366;--green:#0af0b0;--blue:#3399ff;--yellow:#ffcc33;--orange:#ff6633;--purple:#a78bfa;--cyan:#06b6d4;--pink:#ec4899;
  --font:'Manrope',sans-serif;--mono:'DM Mono',monospace;
  --sidebar:230px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:var(--font);overflow-x:hidden;min-height:100vh}

.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,51,102,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,51,102,0.012) 1px,transparent 1px);
  background-size:32px 32px}
.orb{position:fixed;border-radius:50%;filter:blur(160px);pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:rgba(255,51,102,0.035);top:-150px;right:-100px;animation:oF 25s ease-in-out infinite}
.o2{width:400px;height:400px;background:rgba(51,153,255,0.03);bottom:-100px;left:-50px;animation:oF 30s ease-in-out infinite reverse}
@keyframes oF{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-50px)}66%{transform:translate(-30px,40px)}}

.sidebar{width:var(--sidebar);height:100vh;position:fixed;left:0;top:0;background:rgba(10,10,16,0.97);
  backdrop-filter:blur(30px);border-right:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;
  z-index:100;transition:transform 0.3s ease;overflow-y:auto}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.03)}
.sidebar-logo h1{font-size:22px;font-weight:900;letter-spacing:-1px}
.sidebar-logo h1 .a{color:#ff3366}.sidebar-logo h1 .l{color:#ff6633}.sidebar-logo h1 .p2{color:#ffcc33}
.sidebar-logo h1 .i2{color:#33ff99}.sidebar-logo h1 .s2{color:#3399ff}
.sidebar-logo small{font-size:9px;font-family:var(--mono);color:var(--t4);letter-spacing:2px;display:block;margin-top:2px}
.sidebar-nav{flex:1;padding:6px 0}
.nav-section{padding:4px 16px;margin-top:10px}
.nav-section-label{font-size:9px;font-family:var(--mono);color:var(--t4);text-transform:uppercase;letter-spacing:2px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 16px;border:none;
  background:transparent;color:var(--t3);font-size:12px;font-weight:500;font-family:var(--font);
  cursor:pointer;text-align:left;border-left:3px solid transparent;transition:all 0.12s ease}
.nav-btn:hover{background:rgba(255,51,102,0.04)}
.nav-btn.active{background:rgba(255,51,102,0.07);color:var(--accent);border-left-color:var(--accent)}
.nav-btn .icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
.mob-toggle{display:none;position:fixed;top:10px;left:10px;z-index:999;width:40px;height:40px;
  border-radius:10px;border:1px solid var(--border);background:rgba(8,8,14,0.95);color:#fff;
  font-size:18px;cursor:pointer;align-items:center;justify-content:center}

.main{margin-left:var(--sidebar);padding:28px 36px;position:relative;z-index:1;min-height:100vh}
.view{display:none;animation:vIn 0.3s ease forwards}
.view.active{display:block}
@keyframes vIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.view-title{font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.view-title .ic{margin-right:6px}
.view-sub{font-size:11px;font-family:var(--mono);color:var(--t4);margin-bottom:22px}
.label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;
  font-family:var(--mono);margin-bottom:7px;margin-top:14px}

input[type=text],input[type=number],input[type=date],input[type=time],input[type=url],textarea,select{
  padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);
  color:#fff;font-size:13px;font-family:var(--font);width:100%;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:rgba(255,51,102,0.3)}
textarea{resize:vertical;line-height:1.6}
select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6' fill='rgba(255,255,255,0.2)'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:30px}

.btn{padding:10px 22px;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:var(--font);
  cursor:pointer;transition:all 0.15s ease;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{box-shadow:0 0 20px rgba(255,51,102,0.25);transform:translateY(-1px)}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--t3)}
.btn-sec:hover{border-color:rgba(255,255,255,0.15)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px}
.btn-add{width:42px;height:40px;border:none;border-radius:10px;background:var(--accent);color:#fff;
  font-size:20px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-del{border:none;background:transparent;color:var(--t4);font-size:12px;cursor:pointer;padding:4px 6px}
.btn-del:hover{color:var(--accent)}
.btn-green{background:var(--green);color:#000}
.btn-green:hover{box-shadow:0 0 20px rgba(10,240,176,0.25);transform:translateY(-1px)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{box-shadow:0 0 20px rgba(51,153,255,0.25);transform:translateY(-1px)}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{box-shadow:0 0 20px rgba(167,139,250,0.25);transform:translateY(-1px)}

.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{padding:7px 13px;border-radius:8px;border:none;font-size:11px;font-family:var(--font);cursor:pointer;
  background:rgba(255,255,255,0.03);color:var(--t3);transition:all 0.12s;font-weight:500}
.chip.on{background:rgba(255,51,102,0.1);color:var(--accent)}
.chip:hover{opacity:0.85}

.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.row-sb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.flex1{flex:1;min-width:0}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}

.card{padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border);transition:border-color 0.2s}
.card:hover{border-color:rgba(255,255,255,0.08)}
.info-box{padding:10px;border-radius:8px;background:var(--card);border:1px solid var(--border);text-align:center}
.info-box .val{font-size:14px;font-weight:700;font-family:var(--mono)}
.info-box .lbl{font-size:9px;font-family:var(--mono);color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.progress{height:3px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

.empty{text-align:center;color:var(--t4);font-size:13px;padding:40px;font-family:var(--mono)}

.toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:10px;background:var(--green);color:#000;
  font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all 0.3s ease;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.04);border-radius:3px}

@media(max-width:900px){
  .mob-toggle{display:flex!important}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0!important;padding:18px 14px!important}
  .grid2{grid-template-columns:1fr}
}

input[type=range]{accent-color:var(--orange);width:100%}
input[type=color]{border:none;border-radius:6px;cursor:pointer;background:transparent;width:40px;height:32px;padding:0}

/* AI Generation panels */
.ai-gen-area{padding:30px;border-radius:16px;border:2px dashed rgba(167,139,250,0.2);background:rgba(167,139,250,0.02);text-align:center;margin:16px 0}
.ai-gen-area .ai-icon{font-size:48px;margin-bottom:10px;opacity:0.3}
.ai-gen-area .ai-title{font-size:15px;font-weight:600;color:var(--t3)}
.ai-gen-area .ai-sub{font-size:11px;color:var(--t4);font-family:var(--mono);margin-top:4px}

.gen-preview{border-radius:14px;overflow:hidden;background:#111;min-height:200px;display:flex;align-items:center;justify-content:center;position:relative}
.gen-preview img{max-width:100%;max-height:500px;border-radius:14px}
.gen-placeholder{text-align:center;padding:40px;color:var(--t4)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}

/* Ad preview cards */
.ad-card{border-radius:14px;overflow:hidden;background:#111;border:1px solid var(--border)}
.ad-card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.ad-card-body{padding:16px}
.ad-card-cta{padding:12px 14px;border-top:1px solid var(--border)}

}

function buildNav(){
  const el=document.getElementById("nav");
  el.innerHTML=NAV.map(n=>{
    if(n.id.startsWith("_sec")) return `<div class="nav-section"><div class="nav-section-label">${n.label}</div></div>`;
    return `<button class="nav-btn ${n.id===currentView?"active":""}" onclick="switchView('${n.id}')">
    <span class="icon">${n.icon}</span><span>${n.label}</span></button>`;
  }).join("");
}

function switchView(id){
  currentView=id; buildNav(); renderView();
  document.getElementById("sidebar").classList.remove("open");
}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open")}

    resizer:renderResizer,fonts:renderFonts,checklist:renderChecklist,translate:renderTranslate};

        ${Object.entries(PLATFORMS).slice(0,6).map(([k,p])=>`<div class="info-box"><div class="val" style="color:${p.color}">${p.icon}</div><div class="lbl">${p.name}<br>${p.max}ch</div></div>`).join("")}

function doAdapt(){
  const src=document.getElementById("adaptSrc").value;
  if(!src.trim())return;
  const toneEl=document.querySelector('.chip.on[data-tone]');
  const tone=toneEl?toneEl.dataset.tone:"casual";
  const addEmoji=document.getElementById("adaptEmoji").checked;
  const addCTA=document.getElementById("adaptCTA").checked;
  const addHash=document.getElementById("adaptHashtag").checked;

  let html='<div class="label">Rezultate — toate platformele</div><div class="grid3">';
  Object.entries(PLATFORMS).forEach(([key,plat])=>{
    let text=src;
    if(tone==="urgent") text="🔥 "+text.toUpperCase();
    else if(tone==="inspiring") text="✨ "+text;
    else if(tone==="funny") text=text.replace(/\.\s/g,"! ");
    else if(tone==="professional") text=text.charAt(0).toUpperCase()+text.slice(1);
    else if(tone==="storytelling") text="Imaginează-ți asta:\n\n"+text;
    else if(tone==="educational") text="📚 Ce trebuie să știi:\n\n"+text;
    else if(tone==="provocative") text="💥 "+text+"... Ce crezi?";

    if(key==="linkedin") text=text.split(". ").join(".\n\n");
    if(key==="instagram") text+="\n\n·\n·\n·";
    if(key==="tiktok") text="📌 "+text;
    if(key==="threads") text=text.slice(0,500);

    if(addEmoji&&tone!=="urgent"&&tone!=="inspiring") text+=" 🚀✨";
    if(addCTA){
      const ctas={instagram:"\n\n💬 Lasă un comentariu!",twitter:"\n\nRT dacă ești de acord!",linkedin:"\n\n👉 Ce părere aveți? Scrieți mai jos.",
        tiktok:"\n\n👆 Follow pentru mai mult!",facebook:"\n\n🔔 Share dacă îți place!",youtube:"\n\n🔔 Abonează-te!",threads:"\n\n💭 Tu ce zici?",pinterest:"\n\n📌 Salvează pentru mai târziu!"};
      text+=(ctas[key]||"\n\n💬 Ce părere ai?");
    }
    if(addHash){
      const tags=src.toLowerCase().split(/\s+/).filter(w=>w.length>3).slice(0,3).map(w=>"#"+w.replace(/[^a-zA-Z0-9ăâîșț]/g,""));
      text+="\n\n"+tags.join(" ");
    }

    if(text.length>plat.max) text=text.slice(0,plat.max-3)+"...";
    const pct=Math.min(100,Math.round(text.length/plat.max*100));
    const barColor=pct>90?"#ff2d55":pct>70?"#f59e0b":plat.color;

    html+=`<div class="card" style="border-top:3px solid ${plat.color}44">
      <div class="row-sb mb8"><span style="font-size:13px;font-weight:600"><span style="color:${plat.color}">${plat.icon}</span> ${plat.name}</span>
      <span style="font-size:10px;font-family:var(--mono);color:var(--t4)">${text.length}/${plat.max}</span></div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div style="font-size:12px;color:var(--t2);line-height:1.5;white-space:pre-wrap;max-height:120px;overflow:auto;margin:8px 0">${esc(text)}</div>
      <button class="btn btn-sm btn-sec" onclick="copyText(\`${esc(text).replace(/`/g,"\\`")}\`)">◫ Copiază</button>
    </div>`;
  });
  html+='</div>';
  document.getElementById("adaptResults").innerHTML=html;
}

document.addEventListener("input",e=>{
  if(e.target.id==="adaptSrc"){
    const v=e.target.value;
    const c=document.getElementById("adaptCount");
    if(c) c.textContent=`${v.length} caractere · ${v.split(/\s+/).filter(Boolean).length} cuvinte`;
  }
});

      <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="loadImage(event)">
    </div>`;

  const filterCSS=[FILTERS.find(f=>f.id===imgFilter)?.css||"",`brightness(${imgBright}%)`,`contrast(${imgContrast}%)`,`saturate(${imgSat}%)`,imgBlur>0?`blur(${imgBlur}px)`:""].filter(Boolean).join(" ");
  const transform=[`rotate(${imgRotate}deg)`,imgFlipH?"scaleX(-1)":"",imgFlipV?"scaleY(-1)":""].filter(Boolean).join(" ");

  return title("◧","#ff6633","Editor Imagine","Filtre, ajustări, text overlay, export")+`
  <div class="grid2">
    <div>
      <div style="border-radius:14px;overflow:hidden;background:#000;position:relative;display:flex;align-items:center;justify-content:center;min-height:280px">
        <img src="${imgData}" style="max-width:100%;max-height:460px;filter:${filterCSS};transform:${transform};transition:all 0.3s" id="imgPreview">
        ${imgText?`<div style="position:absolute;left:0;right:0;${imgTextPos==="top"?"top:10%":imgTextPos==="bottom"?"bottom:10%":"top:50%;transform:translateY(-50%)"};
          text-align:center;font-size:${imgTextSize}px;font-weight:900;color:${imgTextColor};font-family:var(--font);text-shadow:0 2px 8px rgba(0,0,0,0.7);pointer-events:none">${esc(imgText)}</div>`:""}
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn btn-primary" onclick="downloadImg()">↓ Descarcă</button>
        <button class="btn btn-sec" onclick="resetImg()">↺ Reset</button>
        <button class="btn btn-sec" onclick="imgData=null;renderView()">✕ Altă imagine</button>
      </div>
    </div>
    <div>
      <div class="label">Filtre</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:12px">
        ${FILTERS.map(f=>`<button class="chip ${imgFilter===f.id?"on":""}" onclick="imgFilter='${f.id}';renderView()" style="${imgFilter===f.id?`background:rgba(255,102,51,0.12);color:#ff6633`:""}">${f.name}</button>`).join("")}
      </div>
      <div class="label">Luminozitate <span style="float:right">${imgBright}%</span></div>
      <input type="range" min="0" max="200" value="${imgBright}" oninput="imgBright=+this.value;updateImgPreview()">
      <div class="label">Contrast <span style="float:right">${imgContrast}%</span></div>
      <input type="range" min="0" max="200" value="${imgContrast}" oninput="imgContrast=+this.value;updateImgPreview()">
      <div class="label">Saturație <span style="float:right">${imgSat}%</span></div>
      <input type="range" min="0" max="300" value="${imgSat}" oninput="imgSat=+this.value;updateImgPreview()">
      <div class="label">Blur <span style="float:right">${imgBlur}px</span></div>
      <input type="range" min="0" max="20" value="${imgBlur}" oninput="imgBlur=+this.value;updateImgPreview()">
      <div class="label">Rotație</div>
      <div class="row mb8">${[0,90,180,270].map(r=>`<button class="chip ${imgRotate===r?"on":""}" onclick="imgRotate=${r};renderView()" style="flex:1">${r}°</button>`).join("")}</div>
      <div class="row mb12">
        <button class="chip ${imgFlipH?"on":""}" onclick="imgFlipH=!imgFlipH;renderView()" style="flex:1">↔ Flip H</button>
        <button class="chip ${imgFlipV?"on":""}" onclick="imgFlipV=!imgFlipV;renderView()" style="flex:1">↕ Flip V</button>
      </div>
      <div class="label">Text Overlay</div>
      <input type="text" placeholder="Text pe imagine..." value="${esc(imgText)}" oninput="imgText=this.value;updateImgText()">
      <div class="row" style="margin-top:6px">
        <input type="color" value="${imgTextColor}" oninput="imgTextColor=this.value;updateImgText()">
        <input type="range" min="12" max="72" value="${imgTextSize}" oninput="imgTextSize=+this.value;updateImgText()" style="flex:1">
        <span style="font-size:10px;font-family:var(--mono);color:var(--t4)">${imgTextSize}px</span>
      </div>
      <div class="row" style="margin-top:6px">${["top","center","bottom"].map(p=>`<button class="chip ${imgTextPos===p?"on":""}" onclick="imgTextPos='${p}';renderView()" style="flex:1">${p==="top"?"Sus":p==="center"?"Centru":"Jos"}</button>`).join("")}</div>
    </div>
  </div>`;
}

function loadImage(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{imgData=ev.target.result;renderView()};r.readAsDataURL(f)}
function initImageHandlers(){}
function updateImgPreview(){
  const el=document.getElementById("imgPreview");if(!el)return;
  const f=[FILTERS.find(f=>f.id===imgFilter)?.css||"",`brightness(${imgBright}%)`,`contrast(${imgContrast}%)`,`saturate(${imgSat}%)`,imgBlur>0?`blur(${imgBlur}px)`:""].filter(Boolean).join(" ");
  el.style.filter=f;
}
function updateImgText(){renderView()}
function resetImg(){imgFilter="none";imgBright=100;imgContrast=100;imgSat=100;imgBlur=0;imgRotate=0;imgFlipH=false;imgFlipV=false;imgText="";imgTextColor="#ffffff";imgTextSize=32;imgTextPos="center";renderView()}
function downloadImg(){
  if(!imgData)return;const c=document.createElement("canvas");const img=new Image();img.crossOrigin="anonymous";
  img.onload=()=>{c.width=img.width;c.height=img.height;const ctx=c.getContext("2d");
    const f=[FILTERS.find(f=>f.id===imgFilter)?.css||"",`brightness(${imgBright}%)`,`contrast(${imgContrast}%)`,`saturate(${imgSat}%)`,imgBlur>0?`blur(${imgBlur}px)`:""].filter(Boolean).join(" ");
    ctx.filter=f;ctx.save();ctx.translate(c.width/2,c.height/2);ctx.rotate(imgRotate*Math.PI/180);ctx.scale(imgFlipH?-1:1,imgFlipV?-1:1);
    ctx.drawImage(img,-img.width/2,-img.height/2);ctx.restore();
    if(imgText){ctx.filter="none";ctx.font=`bold ${imgTextSize*(img.width/500)}px Manrope,sans-serif`;ctx.fillStyle=imgTextColor;ctx.textAlign="center";
      const y=imgTextPos==="top"?img.height*0.15:imgTextPos==="bottom"?img.height*0.85:img.height/2;ctx.fillText(imgText,img.width/2,y)}
    const a=document.createElement("a");a.download="alpis-edit.png";a.href=c.toDataURL("image/png");a.click()};
  img.src=imgData;
}

function loadHistoryImg(idx){

function generateAIImage(){
  const promptText=document.getElementById("imgGenPrompt").value.trim();
  if(!promptText){toast(LANG==="en"?"Describe the image!":"Descrie imaginea dorită!");return;}

  const styleEl=document.querySelector('#imgGenStyles .chip.on');
  const style=styleEl?styleEl.dataset.style:"Digital Art";
  const ratioEl=document.querySelector('#imgGenRatios .chip.on');
  const ratio=ratioEl?ratioEl.dataset.ratio:"1:1";
  const cW=+(ratioEl?.dataset.w||1024), cH=+(ratioEl?.dataset.h||1024);
  const light=document.getElementById("imgGenLight").value;
  const mood=document.getElementById("imgGenMood").value;
  const provider=document.getElementById("imgGenProvider").value;
  const apiKey=document.getElementById("imgGenApiKey").value.trim();

  let fullPrompt=promptText+`, ${style.toLowerCase()} style`;
  if(light) fullPrompt+=`, ${light}`;
  if(mood) fullPrompt+=`, ${mood}`;
  fullPrompt+=`, high quality, detailed, professional, 8k`;

  const preview=document.getElementById("imgGenPreview");
  if(!preview) return;
  preview.style.cssText=`border-radius:14px;overflow:hidden;background:#111;min-height:250px;display:flex;align-items:center;justify-content:center;position:relative;aspect-ratio:${cW}/${cH}`;
  preview.innerHTML=`<div style="text-align:center;padding:30px"><div class="spinner"></div><div style="font-size:12px;color:var(--t3);margin-top:8px">${LANG==="en"?"Generating real image with AI...":"Se generează imaginea reală cu AI..."}</div><div style="font-size:10px;color:var(--t4);font-family:var(--mono);margin-top:4px">${provider==="openai"?"DALL·E 3":"Pollinations.ai"}</div></div>`;

  if(provider==="openai"&&apiKey){
    generateWithDallE(apiKey,fullPrompt,style,ratio,cW,cH);
  } else {
    generateWithPollinations(fullPrompt,promptText,style,ratio,cW,cH);
  }

function generateWithPollinations(fullPrompt,shortPrompt,style,ratio,w,h){

async function generateWithDallE(apiKey,prompt,style,ratio,w,h){
  const preview=document.getElementById("imgGenPreview");
  try{
    const sizeMap={"1:1":"1024x1024","16:9":"1792x1024","9:16":"1024x1792"};
    const size=sizeMap[ratio]||"1024x1024";
    const resp=await fetch("https://api.openai.com/v1/images/generations",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
      body:JSON.stringify({model:"dall-e-3",prompt,n:1,size,response_format:"b64_json"})
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error.message);
    const imgUrl="data:image/png;base64,"+data.data[0].b64_json;

    imgGenResult=imgUrl;
    preview.innerHTML=`<img src="${imgUrl}" style="max-width:100%;border-radius:14px">`;
    const dlBtn=document.getElementById("imgDlBtn");if(dlBtn) dlBtn.style.display="inline-flex";

    aiGenImages.unshift({prompt:prompt.split(",")[0],fullPrompt:prompt,style,ratio,dataUrl:imgUrl});
    if(aiGenImages.length>10) aiGenImages.pop();
    showPromptOutput(prompt,style,ratio,w+"×"+h);
    toast(LANG==="en"?"Image generated via DALL·E!":"Imagine generată via DALL·E!");
  }catch(err){
    preview.innerHTML=`<div class="gen-placeholder"><div style="font-size:32px;margin-bottom:8px">⚠️</div><div style="font-size:13px;color:#ff2d55">${t("error")}: ${esc(err.message)}</div><div style="font-size:11px;color:var(--t4);margin-top:6px">${LANG==="en"?"Check your API key":"Verifică cheia API"}</div></div>`;
  }
}

Voiceover:

function drawVideoFrame(t){
  if(!videoCtx)return;
  const ctx=videoCtx,w=1080,h=1920;
  const sections=window._vidSections;
  const total=window._vidTotal;
  const types=window._vidTypes;

  // Find current section
  let elapsed=0,curIdx=0;
  for(let i=0;i<sections.length;i++){
    if(t>=elapsed&&t<elapsed+sections[i].duration){curIdx=i;break}
    elapsed+=sections[i].duration;
    if(i===sections.length-1) curIdx=i;
  }
  const sec=sections[curIdx];
  const secStart=sections.slice(0,curIdx).reduce((s,sc)=>s+sc.duration,0);
  const secProgress=Math.min(1,(t-secStart)/Math.max(1,sec.duration));
  const typeInfo=types[sec.type]||types.body;

  // Background
  const bgColors={
    hook:["#1a0011","#330022","#ff2d55"],
    intro:["#001122","#002244","#3399ff"],
    body:["#001a0d","#003320","#33ff99"],
    cta:["#1a1500","#332a00","#ffcc33"],
    broll:["#0d0022","#1a0044","#a78bfa"],
    transition:["#001a22","#003344","#06b6d4"]
  };
  const bg=bgColors[sec.type]||bgColors.body;
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,bg[0]);grad.addColorStop(0.5,bg[1]);grad.addColorStop(1,bg[0]);
  ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);

  // Animated particles
  const seed=curIdx*1000;
  for(let i=0;i<40;i++){
    const px=((seed+i*137+t*30*(i%3+1))%w);
    const py=((seed+i*251+t*20*(i%2+1))%h);
    const ps=2+((i*7)%6);
    ctx.beginPath();ctx.arc(px,py,ps,0,Math.PI*2);
    ctx.fillStyle=bg[2]+"33";ctx.fill();
  }

  // Moving lines
  for(let i=0;i<4;i++){
    ctx.beginPath();ctx.strokeStyle=bg[2]+"15";ctx.lineWidth=2;
    const ly=h*0.2+i*h*0.2+Math.sin(t*0.5+i)*60;
    ctx.moveTo(0,ly);ctx.bezierCurveTo(w*0.3,ly-80+Math.sin(t+i)*40,w*0.7,ly+80+Math.cos(t+i)*40,w,ly);
    ctx.stroke();
  }

  // Section type badge
  ctx.fillStyle="rgba(0,0,0,0.5)";
  roundRect(ctx,40,80,240,56,16);ctx.fill();
  ctx.fillStyle=bg[2];ctx.font="bold 22px Manrope,sans-serif";ctx.textAlign="left";
  ctx.fillText(typeInfo.l.toUpperCase(),70,116);

  // Scene counter
  ctx.fillStyle="rgba(0,0,0,0.5)";
  roundRect(ctx,w-180,80,140,56,16);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 22px Manrope,sans-serif";ctx.textAlign="center";
  ctx.fillText(`${curIdx+1}/${sections.length}`,w-110,116);

  // Main text with animation
  const text=sec.text||typeInfo.l;
  const words=text.split(/\s+/);
  const maxCharsPerLine=20;
  let lines=[];let currentLine="";
  words.forEach(word=>{
    if((currentLine+word).length>maxCharsPerLine){if(currentLine)lines.push(currentLine.trim());currentLine=word+" "}
    else currentLine+=word+" ";
  });
  if(currentLine.trim())lines.push(currentLine.trim());

  // Text entrance animation
  const textAlpha=Math.min(1,secProgress*4);
  const textY=h*0.35;
  ctx.textAlign="center";

  lines.forEach((line,li)=>{
    const lineDelay=li*0.08;
    const lineProgress=Math.max(0,Math.min(1,(secProgress-lineDelay)*5));
    const slideX=40*(1-lineProgress);

    ctx.globalAlpha=lineProgress*textAlpha;

    // Text shadow
    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.font=`bold ${sec.type==="hook"?68:54}px Manrope,sans-serif`;
    ctx.fillText(line,w/2+slideX+3,textY+li*80+3);

    // Main text
    ctx.fillStyle="#fff";
    ctx.fillText(line,w/2+slideX,textY+li*80);
  });
  ctx.globalAlpha=1;

  // Subtitle bar at bottom
  if(sec.text){
    const subText=sec.text.split(/[.!?]/)[0]||sec.text;
    ctx.fillStyle="rgba(0,0,0,0.65)";
    roundRect(ctx,60,h-280,w-120,90,20);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="600 28px Manrope,sans-serif";ctx.textAlign="center";
    ctx.fillText(subText.slice(0,40)+(subText.length>40?"...":""),w/2,h-225);
  }

  // ALPis watermark
  ctx.globalAlpha=0.2;ctx.fillStyle="#fff";ctx.font="bold 20px Manrope,sans-serif";
  ctx.textAlign="right";ctx.fillText("ALPis Studio",w-50,h-150);ctx.globalAlpha=1;

  // Progress bar
  const progressW=w-120;
  ctx.fillStyle="rgba(255,255,255,0.1)";
  roundRect(ctx,60,h-110,progressW,8,4);ctx.fill();
  ctx.fillStyle=bg[2];
  roundRect(ctx,60,h-110,progressW*(t/total),8,4);ctx.fill();

  // Timestamp
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
  ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="500 20px 'DM Mono',monospace";ctx.textAlign="left";
  ctx.fillText(fmt(t),60,h-75);ctx.textAlign="right";ctx.fillText(fmt(total),w-60,h-75);

  // Transition effect between sections
  if(secProgress>0.9){
    const fadeOut=(secProgress-0.9)*10;
    ctx.fillStyle=`rgba(0,0,0,${fadeOut*0.5})`;ctx.fillRect(0,0,w,h);
  }
  if(secProgress<0.1){
    const fadeIn=(0.1-secProgress)*10;
    ctx.fillStyle=`rgba(0,0,0,${fadeIn*0.5})`;ctx.fillRect(0,0,w,h);
  }

  // Update scene list highlight
  sections.forEach((s,i)=>{
    const el=document.getElementById("vidScene"+i);
    if(el) el.style.opacity=i===curIdx?"1":"0.35";
  });

  // Update timer
  const timerEl=document.getElementById("vidTimer");
  if(timerEl) timerEl.textContent=`${fmt(t)} / ${fmt(total)}`;

  // Update progress bar
  const barEl=document.getElementById("vidProgressBar");
  if(barEl) barEl.style.width=`${(t/total)*100}%`;
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

function toggleVideoPlay(){
  if(!videoCanvas)return;
  videoPlaying=!videoPlaying;
  const btn=document.getElementById("vidPlayBtn");
  if(btn) btn.textContent=videoPlaying?"⏸ Pause":"▶ Play";
  if(videoPlaying){
    let lastTime=performance.now();
    function animate(now){
      if(!videoPlaying)return;
      const dt=(now-lastTime)/1000;lastTime=now;
      window._vidTime+=dt;
      if(window._vidTime>=window._vidTotal){window._vidTime=0;}
      drawVideoFrame(window._vidTime);
      videoAnimFrame=requestAnimationFrame(animate);
    }
    videoAnimFrame=requestAnimationFrame(animate);
  } else {
    if(videoAnimFrame) cancelAnimationFrame(videoAnimFrame);
  }
}

function resetVideoPlay(){
  videoPlaying=false;
  if(videoAnimFrame) cancelAnimationFrame(videoAnimFrame);
  window._vidTime=0;
  const btn=document.getElementById("vidPlayBtn");
  if(btn) btn.textContent="▶ Play";
  drawVideoFrame(0);
}

function seekVideo(e){
  if(!window._vidTotal)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  window._vidTime=pct*window._vidTotal;
  drawVideoFrame(window._vidTime);
}

function downloadVideoWebM(){
  if(!videoCanvas||!window._vidSections){toast("Generează video-ul întâi!");return;}

  const statusEl=document.getElementById("vidRecStatus");
  if(statusEl) statusEl.innerHTML='<span style="color:var(--accent)">⏺ Se înregistrează video-ul... Așteptați.</span>';

  // Stop any current playback
  videoPlaying=false;
  if(videoAnimFrame) cancelAnimationFrame(videoAnimFrame);
  const btn=document.getElementById("vidPlayBtn");
  if(btn) btn.textContent="▶ Play";

  const stream=videoCanvas.captureStream(30);
  const recorder=new MediaRecorder(stream,{mimeType:"video/webm;codecs=vp9",videoBitsPerSecond:8000000});
  const chunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0) chunks.push(e.data)};
  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:"video/webm"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.download="alpis-video.webm";a.href=url;a.click();
    URL.revokeObjectURL(url);
    if(statusEl) statusEl.innerHTML='<span style="color:var(--green)">✅ Video descărcat!</span>';
    setTimeout(()=>{if(statusEl) statusEl.textContent=""},3000);
    toast("Video .webm descărcat!");
  };

  recorder.start();

  // Render all frames at ~30fps speed
  const total=window._vidTotal;
  const fps=30;
  const frameDuration=1/fps;
  let currentTime=0;

  function renderRecFrame(){
    if(currentTime>=total){
      recorder.stop();
      return;
    }
    drawVideoFrame(currentTime);
    currentTime+=frameDuration;

    // Update status

function harmonyPalette(type){const h=Math.random()*360;const offsets={analogous:[0,30,60,90,120],complementary:[0,15,180,195,210],triadic:[0,20,120,140,240]};
  paletteColors=offsets[type].map(o=>hslHex((h+o)%360,65+Math.random()*20,45+Math.random()*15));renderView()}
function hslHex(h,s,l){s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return"#"+[0,8,4].map(n=>Math.round(255*f(n)).toString(16).padStart(2,"0")).join("")}

function renderAnalyze(){

  <div id="analyzeResults" style="margin-top:16px"></div>`;
}
function doAnalyze(){
  const text=document.getElementById("analyzeText").value;if(!text.trim()){document.getElementById("analyzeResults").innerHTML="";return}
  const chars=text.length, charsNoSpace=text.replace(/\s/g,"").length;
  const words=text.split(/\s+/).filter(Boolean), wordCount=words.length;
  const sentences=text.split(/[.!?]+/).filter(s=>s.trim().length>0), sentCount=sentences.length;
  const paragraphs=text.split(/\n\s*\n/).filter(p=>p.trim().length>0), paraCount=paragraphs.length;
  const avgWordLen=wordCount?words.reduce((s,w)=>s+w.length,0)/wordCount:0;
  const avgSentLen=sentCount?wordCount/sentCount:0;
  const readTime=Math.ceil(wordCount/200);
  const speakTime=Math.ceil(wordCount/130);
  const syllables=words.reduce((s,w)=>s+countSyllables(w),0);
  const flesch=sentCount&&wordCount?Math.round(206.835-1.015*(wordCount/sentCount)-84.6*(syllables/wordCount)):0;
  const fleschLabel=flesch>=80?"Foarte ușor":flesch>=60?"Ușor":flesch>=40?"Mediu":flesch>=20?"Dificil":"Foarte dificil";
  const fleschColor=flesch>=60?"var(--green)":flesch>=40?"var(--yellow)":"#ff2d55";
  const freq={};words.forEach(w=>{const lw=w.toLowerCase().replace(/[^a-zA-ZăâîșțÀ-ú0-9]/g,"");if(lw.length>3)freq[lw]=(freq[lw]||0)+1});
  const topWords=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const unique=new Set(words.map(w=>w.toLowerCase().replace(/[^a-zA-ZăâîșțÀ-ú0-9]/g,""))).size;
  const diversity=wordCount?Math.round(unique/wordCount*100):0;

  document.getElementById("analyzeResults").innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:18px">
      ${[["Caractere",chars,"#ff3366"],["Fără spații",charsNoSpace,"#ff6633"],["Cuvinte",wordCount,"var(--blue)"],["Propoziții",sentCount,"var(--green)"],["Paragrafe",paraCount,"var(--purple)"],["Timp citire",readTime+"min","var(--cyan)"],["Timp vorbit",speakTime+"min","var(--yellow)"],["Cuvinte unice",unique,"var(--pink)"]].map(([l,v,c])=>`<div class="info-box" style="border-top:2px solid ${c}44"><div class="val" style="color:${c}">${v}</div><div class="lbl">${l}</div></div>`).join("")}
    </div>
    <div class="grid2 mb16">
      <div class="card">
        <div class="label" style="margin-top:0">Readability Score</div>
        <div class="row" style="align-items:baseline;gap:12px">
          <span style="font-size:36px;font-weight:900;font-family:var(--mono);color:${fleschColor}">${flesch}</span>
          <span style="font-size:13px;color:var(--t3)">${fleschLabel}</span>
        </div>
        <div class="progress" style="margin-top:8px"><div class="progress-fill" style="width:${Math.min(100,flesch)}%;background:${fleschColor}"></div></div>
        <div style="font-size:11px;color:var(--t4);margin-top:6px">Medie cuvinte/propoziție: ${avgSentLen.toFixed(1)} · Medie litere/cuvânt: ${avgWordLen.toFixed(1)} · Diversitate lexicală: ${diversity}%</div>
      </div>
      <div class="card">
        <div class="label" style="margin-top:0">Top 10 cuvinte</div>
        ${topWords.map(([w,c])=>{const pct=Math.round(c/wordCount*100);return`<div class="row" style="margin-bottom:3px"><span style="font-size:12px;color:var(--t2);flex:1">${w}</span><span style="font-size:10px;font-family:var(--mono);color:var(--t4)">${c}× (${pct}%)</span></div><div class="progress"><div class="progress-fill" style="width:${Math.min(100,pct*5)}%;background:var(--blue)"></div></div>`}).join("")}
      </div>
    </div>
    <div class="card">
      <div class="label" style="margin-top:0">Compatibilitate platforme</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px">${Object.entries(PLATFORMS).map(([k,p])=>{
        const fit=text.length<=p.max;const pct=Math.min(100,Math.round(text.length/p.max*100));
        return`<div class="row" style="padding:6px;border-radius:6px;background:rgba(255,255,255,0.015)">
          <span style="color:${p.color};font-size:12px">${p.icon}</span>
          <span style="font-size:11px;flex:1">${p.name}</span>
          <span style="font-size:10px;font-family:var(--mono);color:${fit?"var(--green)":"#ff2d55"}">${fit?"✓":"✕"} ${pct}%</span></div>`}).join("")}
      </div>
    </div>`;
}
function countSyllables(w){w=w.toLowerCase().replace(/[^a-z]/g,"");if(w.length<=3)return 1;w=w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,"").replace(/^y/,"");const m=w.match(/[aeiouy]{1,2}/g);return m?m.length:1}

function scoreAB(){

    if(t===t.toUpperCase()&&t.length>5) score-=10;

  <button class="btn btn-primary mb20" onclick="doRepurpose()">↻ Transformă în toate formatele</button>

function doRepurpose(){
  const src=document.getElementById("repSrc").value;if(!src.trim())return;
  const sentences=src.split(/[.!?]+/).filter(s=>s.trim().length>5).map(s=>s.trim());
  const first3=sentences.slice(0,3).join(". ")+".";
  const keyPoints=sentences.slice(0,5);

  const formats=[
    {name:"Tweet / X Thread",icon:"✕",color:"#1DA1F2",content:sentences.slice(0,5).map((s,i)=>`${i+1}/ ${s}.`).join("\n\n")},
    {name:"Instagram Caption",icon:"◉",color:"#E1306C",content:`${first3}\n\n✨ Ce părere ai? Spune-mi în comentarii! 👇\n\n·\n·\n·\n\n#content #creator #viral`},
    {name:"LinkedIn Post",icon:"▦",color:"#0A66C2",content:`${sentences[0]}.\n\nIată ce am învățat:\n\n${keyPoints.map(s=>`→ ${s}`).join("\n")}\n\n💬 Tu ce experiență ai? Scrie mai jos.`},
    {name:"TikTok Script",icon:"♫",color:"#00f2ea",content:`🎣 HOOK: ${sentences[0]}\n\n📝 BODY: ${sentences.slice(1,3).join(". ")}.\n\n📢 CTA: Follow pentru mai mult!`},
    {name:"Email Newsletter",icon:"✉",color:"#f59e0b",content:`Subiect: ${sentences[0]}\n\nSalut!\n\n${first3}\n\nPuncte cheie:\n${keyPoints.map(s=>`• ${s}`).join("\n")}\n\nPână data viitoare,\n[Numele tău]`},
    {name:"YouTube Description",icon:"▶",color:"#FF0000",content:`${first3}\n\n⏰ Timestamps:\n00:00 Intro\n01:00 ${sentences[0]}\n03:00 ${sentences[1]||"Detalii"}\n05:00 Concluzie\n\n📌 Resurse menționate:\n• Link 1\n• Link 2\n\n🔔 Abonează-te!`},
    {name:"Pinterest Pin",icon:"◎",color:"#E60023",content:`📌 ${sentences[0]}\n\n${keyPoints.slice(0,3).map(s=>`✓ ${s}`).join("\n")}\n\n💾 Salvează pentru mai târziu!`},
    {name:"Blog Outline",icon:"≡",color:"#06b6d4",content:`# ${sentences[0]}\n\n## Introducere\n${first3}\n\n${keyPoints.map((s,i)=>`## ${i+1}. ${s}`).join("\n\n")}\n\n## Concluzie\nRezumat și call-to-action.`}
  ];

  document.getElementById("repResults").innerHTML=`<div class="grid3">${formats.map(f=>`
    <div class="card" style="border-top:3px solid ${f.color}44">
      <div class="row-sb mb8"><span style="font-size:13px;font-weight:600"><span style="color:${f.color}">${f.icon}</span> ${f.name}</span></div>
      <div style="font-size:11px;color:var(--t3);line-height:1.5;white-space:pre-wrap;max-height:160px;overflow:auto;margin-bottom:8px">${esc(f.content)}</div>
      <button class="btn btn-sm btn-sec" onclick="copyText(\`${esc(f.content).replace(/`/g,'\\`').replace(/\n/g,'\\n')}\`)">◫ Copiază</button>
    </div>`).join("")}</div>`;
}

function generateAdVisual(type){
  const product=document.getElementById("adProduct")?.value.trim()||"Product";
  const benefit=document.getElementById("adBenefit")?.value.trim()||"";
  const offer=document.getElementById("adOffer")?.value.trim()||"";
  const mainColor=document.querySelector('#adPlatforms .chip.on')?.style.color||"#ff3366";
  
  const preview=document.getElementById("adVisualPreview");
  if(!preview) return;

  if(type==="video"){
    // Generate ad video canvas
    const canvas=document.createElement("canvas");canvas.width=1080;canvas.height=1920;
    const ctx=canvas.getContext("2d");

    // Background
    const grad=ctx.createLinearGradient(0,0,0,1920);
    grad.addColorStop(0,"#0a0a15");grad.addColorStop(0.5,"#1a1030");grad.addColorStop(1,"#0a0a15");
    ctx.fillStyle=grad;ctx.fillRect(0,0,1080,1920);

    // Decorative
    ctx.globalAlpha=0.1;ctx.fillStyle=mainColor;
    ctx.beginPath();ctx.arc(540,600,400,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // Ad content
    ctx.fillStyle="#fff";ctx.font="900 64px Manrope,sans-serif";ctx.textAlign="center";
    const pLines=wrapText(ctx,product.toUpperCase(),900);
    pLines.forEach((line,i)=>ctx.fillText(line,540,700+i*80));

    if(benefit){ctx.fillStyle="rgba(255,255,255,0.7)";ctx.font="400 28px Manrope,sans-serif";
      ctx.fillText(benefit.slice(0,50),540,700+pLines.length*80+50)}

    if(offer){ctx.fillStyle=mainColor;ctx.font="800 48px Manrope,sans-serif";
      ctx.fillText(offer,540,700+pLines.length*80+130)}

    // CTA button
    ctx.fillStyle="#fff";roundRect(ctx,340,1400,400,60,30);ctx.fill();
    ctx.fillStyle="#000";ctx.font="700 22px Manrope,sans-serif";
    ctx.fillText(LANG==="en"?"Shop Now →":"Cumpără acum →",540,1438);

    ctx.fillStyle="rgba(255,255,255,0.15)";ctx.font="14px Manrope";ctx.fillText("ALPis Studio",540,1850);

    const dataUrl=canvas.toDataURL("image/png");
    preview.innerHTML=`
      <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-top:12px">
        <div style="width:200px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.4)">
          <img src="${dataUrl}" style="width:100%;display:block">
        </div>
        <div style="flex:1;min-width:200px">
          <div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:8px">🎬 ${LANG==="en"?"Ad Video Frame (9:16)":"Cadru Video Reclamă (9:16)"}</div>
          <div style="font-size:11px;color:var(--t3);line-height:1.5;margin-bottom:12px">${LANG==="en"?"Generated vertical ad frame ready for animation in CapCut, Premiere or Canva.":"Cadru vertical de reclamă gata pentru animare în CapCut, Premiere sau Canva."}</div>
          <button class="btn btn-sm btn-purple" onclick="dlCanvas('${dataUrl}','alpis-ad-video.png')">↓ ${t("download")} PNG</button>
        </div>
      </div>`;
    toast(LANG==="en"?"Ad video frame generated!":"Cadru video reclamă generat!");

  } else {
    // Generate ad image
    const sizes=[{w:1200,h:628,name:"Facebook/LinkedIn"},{w:1080,h:1080,name:"Instagram"},{w:1080,h:1920,name:"Story"}];
    let imgsHtml="";

    sizes.forEach(size=>{
      const canvas=document.createElement("canvas");canvas.width=size.w;canvas.height=size.h;
      const ctx=canvas.getContext("2d");

      const grad=ctx.createLinearGradient(0,0,size.w,size.h);
      grad.addColorStop(0,"#1a1030");grad.addColorStop(1,"#0a0a20");
      ctx.fillStyle=grad;ctx.fillRect(0,0,size.w,size.h);

      // Accent circle
      ctx.globalAlpha=0.12;ctx.fillStyle=mainColor;
      ctx.beginPath();ctx.arc(size.w*0.75,size.h*0.4,size.h*0.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

      // Product name
      const fontSize=Math.min(56,size.w*0.05);
      ctx.fillStyle="#fff";ctx.font=`900 ${fontSize}px Manrope,sans-serif`;ctx.textAlign="center";
      ctx.fillText(product,size.w/2,size.h*0.4);

      if(benefit){ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font=`400 ${fontSize*0.4}px Manrope,sans-serif`;
        ctx.fillText(benefit.slice(0,60),size.w/2,size.h*0.4+fontSize*0.8)}

      if(offer){ctx.fillStyle=mainColor;ctx.font=`800 ${fontSize*0.7}px Manrope,sans-serif`;
        ctx.fillText(offer,size.w/2,size.h*0.65)}

      // CTA
      const bw=Math.min(250,size.w*0.3),bh=40;
      ctx.fillStyle="#fff";roundRect(ctx,size.w/2-bw/2,size.h*0.78,bw,bh,20);ctx.fill();
      ctx.fillStyle="#000";ctx.font=`700 ${fontSize*0.28}px Manrope,sans-serif`;
      ctx.fillText(LANG==="en"?"Learn More":"Află mai mult",size.w/2,size.h*0.78+26);

      ctx.fillStyle="rgba(255,255,255,0.1)";ctx.font="10px Manrope";ctx.textAlign="right";
      ctx.fillText("ALPis",size.w-15,size.h-10);

      const dataUrl=canvas.toDataURL("image/png");
      imgsHtml+=`<div style="flex:1;min-width:180px">
        <div style="border-radius:10px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.3)">
          <img src="${dataUrl}" style="width:100%;display:block">
        </div>
        <div style="font-size:10px;font-family:var(--mono);color:var(--t4);text-align:center;margin:4px 0">${size.name} · ${size.w}×${size.h}</div>
        <div style="text-align:center"><button class="btn btn-sm btn-sec" onclick="dlCanvas('${dataUrl}','alpis-ad-${size.w}x${size.h}.png')">↓ ${t("download")}</button></div>
      </div>`;
    });

    preview.innerHTML=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px">${imgsHtml}</div>`;
    toast(LANG==="en"?"Ad images generated!":"Imagini reclamă generate!");
  }
}

function generateInvite(){
  const typeEl=document.querySelector('#invType .chip.on');
  const type=typeEl?typeEl.dataset.inv:"Petrecere";
  const titleText=document.getElementById("invTitle").value.trim()||type;
  const date=document.getElementById("invDate").value;
  const time=document.getElementById("invTime").value;
  const location=document.getElementById("invLocation").value.trim()||"Locație de confirmat";
  const msg=document.getElementById("invMsg").value.trim()||"Vă așteptăm cu drag!";
  const styleEl=document.querySelector('#invStyle .chip.on');
  const style=styleEl?styleEl.dataset.invstyle:"elegant";

  const styles={
    elegant:{bg:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",accent:"#d4af37",font:"serif",border:"2px solid #d4af3744",ornament:"✦"},
    modern:{bg:"linear-gradient(135deg,#0a0a0a,#1a1a2a)",accent:"#ff3366",font:"sans-serif",border:"none",ornament:"◆"},
    rustic:{bg:"linear-gradient(135deg,#2c1810,#3d2317,#4a2c1a)",accent:"#d4a574",font:"serif",border:"2px solid #d4a57433",ornament:"❋"},
    floral:{bg:"linear-gradient(135deg,#1a0d1a,#2d1033,#1a0d1a)",accent:"#f472b6",font:"serif",border:"2px solid #f472b633",ornament:"✿"},
    minimal:{bg:"#fafafa",accent:"#111",font:"sans-serif",border:"1px solid #ddd",ornament:"—",dark:false},
    luxury:{bg:"linear-gradient(135deg,#0a0a0a,#1a1a1a)",accent:"#ffd700",font:"serif",border:"2px solid #ffd70044",ornament:"♛"},
    fun:{bg:"linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb)",accent:"#fff",font:"sans-serif",border:"none",ornament:"★"},
    dark:{bg:"linear-gradient(135deg,#0d0d0d,#1a1a2e,#0d0d0d)",accent:"#a78bfa",font:"serif",border:"2px solid #a78bfa33",ornament:"◈"}
  };
  const s=styles[style]||styles.elegant;
  const textColor=style==="minimal"?"#111":"#fff";
  const subColor=style==="minimal"?"#666":"rgba(255,255,255,0.6)";
  const fmtDate=date?new Date(date+"T00:00").toLocaleDateString("ro-RO",{weekday:"long",year:"numeric",month:"long",day:"numeric"}):"Data de confirmat";

  const canvas=document.createElement("canvas");canvas.width=1080;canvas.height=1080;
  const ctx=canvas.getContext("2d");

  // Background
  if(s.bg.includes("gradient")){
    const colors=s.bg.match(/#[a-f0-9]{6}/gi)||["#1a1a2e","#0f3460"];
    const grad=ctx.createLinearGradient(0,0,1080,1080);
    colors.forEach((c,i)=>grad.addColorStop(i/(colors.length-1),c));
    ctx.fillStyle=grad;
  } else ctx.fillStyle=s.bg;
  ctx.fillRect(0,0,1080,1080);

  // Decorative border
  if(s.border!=="none"){ctx.strokeStyle=s.accent+"66";ctx.lineWidth=3;ctx.strokeRect(40,40,1000,1000);
    ctx.strokeRect(55,55,970,970);ctx.globalAlpha=0.3;ctx.strokeRect(70,70,940,940);ctx.globalAlpha=1}

  // Corner ornaments
  ctx.fillStyle=s.accent;ctx.font=`24px ${s.font}`;ctx.globalAlpha=0.3;
  ctx.textAlign="center";
  [s.ornament+" "+s.ornament+" "+s.ornament].forEach(o=>{ctx.fillText(o,540,110);ctx.fillText(o,540,1000)});
  ctx.globalAlpha=1;

  // Type label
  ctx.fillStyle=s.accent;ctx.font=`600 18px Manrope,${s.font}`;ctx.textAlign="center";ctx.letterSpacing="8px";
  ctx.fillText(type.toUpperCase(),540,200);

  // Title
  ctx.fillStyle=textColor;ctx.font=`800 52px Manrope,${s.font}`;
  const titleLines=wrapText(ctx,titleText,800);
  titleLines.forEach((line,i)=>ctx.fillText(line,540,320+i*65));

  // Ornament divider
  ctx.fillStyle=s.accent;ctx.font=`28px ${s.font}`;
  ctx.fillText(s.ornament+" — "+s.ornament,540,320+titleLines.length*65+30);

  // Message
  ctx.fillStyle=subColor;ctx.font=`400 22px Manrope,${s.font}`;
  const msgLines=wrapText(ctx,msg,750);
  const msgY=320+titleLines.length*65+80;
  msgLines.forEach((line,i)=>ctx.fillText(line,540,msgY+i*32));

  // Date & Time
  const infoY=msgY+msgLines.length*32+50;
  ctx.fillStyle=s.accent;ctx.font=`700 26px Manrope,${s.font}`;
  ctx.fillText("📅  "+fmtDate,540,infoY);
  ctx.fillText("🕐  "+time,540,infoY+42);
  ctx.fillText("📍  "+location,540,infoY+84);

  // Footer
  ctx.fillStyle=subColor;ctx.globalAlpha=0.4;ctx.font="14px Manrope,sans-serif";
  ctx.fillText("Creat cu ALPis Studio",540,1050);ctx.globalAlpha=1;

  const dataUrl=canvas.toDataURL("image/png");
  document.getElementById("invPreview").innerHTML=`
    <div style="border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4)">
      <img src="${dataUrl}" style="width:100%;display:block">
    </div>
    <div class="row" style="margin-top:12px;justify-content:center">
      <button class="btn btn-primary" onclick="dlCanvas('${dataUrl}','alpis-invitatie.png')">↓ Descarcă Invitația</button>
      <button class="btn btn-sec" onclick="copyText(\`${esc(titleText+"\\n"+fmtDate+" | "+time+"\\n"+location+"\\n\\n"+msg)}\`)">◫ Copiază textul</button>
    </div>`;
  toast("Invitație generată!");
}

function generateFlyer(){
  const titleText=document.getElementById("flyTitle").value.trim()||"TITLU FLYER";
  const sub=document.getElementById("flySub").value.trim();
  const body=document.getElementById("flyBody").value.trim();
  const cta=document.getElementById("flyCta").value.trim()||"Află mai mult";
  const contact=document.getElementById("flyContact").value.trim();
  const fmtEl=document.querySelector('#flyFormat .chip.on');
  const fmt=fmtEl?fmtEl.dataset.flyf:"a4";
  const styleEl=document.querySelector('#flyStyle .chip.on');
  const fStyle=styleEl?styleEl.dataset.flys:"bold";
  const mainColor=document.getElementById("flyColor").value;

  const dims={a4:[794,1123],a4h:[1123,794],sq:[1080,1080],story:[1080,1920]};
  const [cw,ch]=dims[fmt]||dims.a4;

  const canvas=document.createElement("canvas");canvas.width=cw;canvas.height=ch;
  const ctx=canvas.getContext("2d");

  // Background
  if(fStyle==="neon"){ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,cw,ch)}
  else if(fStyle==="retro"){const g=ctx.createLinearGradient(0,0,cw,ch);g.addColorStop(0,"#f39c12");g.addColorStop(1,"#e74c3c");ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch)}
  else if(fStyle==="gradient"){const g=ctx.createLinearGradient(0,0,cw,ch);g.addColorStop(0,mainColor);g.addColorStop(1,adjustColor(mainColor,-40));ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch)}
  else if(fStyle==="corporate"){ctx.fillStyle="#f8f9fa";ctx.fillRect(0,0,cw,ch);ctx.fillStyle=mainColor;ctx.fillRect(0,0,cw,ch*0.08)}
  else if(fStyle==="clean"){ctx.fillStyle="#fff";ctx.fillRect(0,0,cw,ch)}
  else{ctx.fillStyle=mainColor;ctx.fillRect(0,0,cw,ch)}

  const isDark=fStyle!=="clean"&&fStyle!=="corporate";
  const textColor=isDark?"#fff":"#111";
  const subTextColor=isDark?"rgba(255,255,255,0.7)":"#555";

  // Decorative shapes
  if(fStyle==="bold"){ctx.globalAlpha=0.15;ctx.fillStyle="#000";ctx.beginPath();ctx.arc(cw*0.8,ch*0.2,cw*0.3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  if(fStyle==="neon"){ctx.shadowBlur=40;ctx.shadowColor=mainColor;ctx.strokeStyle=mainColor;ctx.lineWidth=2;ctx.strokeRect(30,30,cw-60,ch-60);ctx.shadowBlur=0}

  // Title
  const titleSize=Math.min(72,cw*0.08);
  ctx.fillStyle=fStyle==="neon"?mainColor:textColor;ctx.font=`900 ${titleSize}px Manrope,sans-serif`;ctx.textAlign="center";
  if(fStyle==="neon"){ctx.shadowBlur=20;ctx.shadowColor=mainColor}
  const tLines=wrapText(ctx,titleText.toUpperCase(),cw*0.8);
  tLines.forEach((line,i)=>ctx.fillText(line,cw/2,ch*0.22+i*(titleSize+10)));
  ctx.shadowBlur=0;

  // Subtitle
  if(sub){ctx.fillStyle=subTextColor;ctx.font=`600 ${Math.floor(titleSize*0.45)}px Manrope,sans-serif`;
    ctx.fillText(sub,cw/2,ch*0.22+tLines.length*(titleSize+10)+20)}

  // Body text
  if(body){ctx.fillStyle=subTextColor;ctx.font=`400 ${Math.floor(titleSize*0.33)}px Manrope,sans-serif`;
    const bLines=wrapText(ctx,body,cw*0.75);
    const bodyY=ch*0.5;
    bLines.forEach((line,i)=>ctx.fillText(line,cw/2,bodyY+i*(titleSize*0.42)))}

  // CTA button
  const ctaY=ch*0.78;
  const ctaW=Math.min(cw*0.6,400),ctaH=56;
  if(fStyle==="neon"){ctx.strokeStyle=mainColor;ctx.lineWidth=2;ctx.shadowBlur=15;ctx.shadowColor=mainColor;roundRect(ctx,cw/2-ctaW/2,ctaY,ctaW,ctaH,28);ctx.stroke();ctx.shadowBlur=0}
  else{ctx.fillStyle=isDark?"#fff":mainColor;roundRect(ctx,cw/2-ctaW/2,ctaY,ctaW,ctaH,28);ctx.fill()}
  ctx.fillStyle=isDark?(fStyle==="neon"?mainColor:"#000"):"#fff";ctx.font=`700 ${Math.floor(titleSize*0.35)}px Manrope,sans-serif`;
  ctx.fillText(cta,cw/2,ctaY+36);

  // Contact
  if(contact){ctx.fillStyle=subTextColor;ctx.globalAlpha=0.6;ctx.font=`400 ${Math.floor(titleSize*0.25)}px Manrope,sans-serif`;
    ctx.fillText(contact,cw/2,ch*0.92);ctx.globalAlpha=1}

  // Watermark
  ctx.fillStyle=subTextColor;ctx.globalAlpha=0.2;ctx.font="12px Manrope,sans-serif";ctx.fillText("ALPis Studio",cw/2,ch-15);ctx.globalAlpha=1;

  const dataUrl=canvas.toDataURL("image/png");
  document.getElementById("flyPreview").innerHTML=`
    <div style="border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4)">
      <img src="${dataUrl}" style="width:100%;display:block">
    </div>
    <div class="row" style="margin-top:12px;justify-content:center">
      <button class="btn btn-primary" onclick="dlCanvas('${dataUrl}','alpis-flyer.png')">↓ Descarcă Flyer</button>
    </div>`;
  toast("Flyer generat!");
}

function generateBanner(){
  const titleText=document.getElementById("banTitle").value.trim()||"BANNER TITLU";
  const sub=document.getElementById("banSub").value.trim();
  const cta=document.getElementById("banCta").value.trim()||"Află mai mult";
  const sizeEl=document.querySelector('#banSize .chip.on');
  const dim=sizeEl?sizeEl.dataset.band:"1200x628";
  const [cw,ch]=dim.split("x").map(Number);
  const styleEl=document.querySelector('#banStyle .chip.on');
  const bStyle=styleEl?styleEl.dataset.bans:"gradient";
  const c1=document.getElementById("banColor1").value;
  const c2=document.getElementById("banColor2").value;

  const canvas=document.createElement("canvas");canvas.width=cw;canvas.height=ch;
  const ctx=canvas.getContext("2d");

  // Background
  if(bStyle==="gradient"){const g=ctx.createLinearGradient(0,0,cw,ch);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch)}
  else if(bStyle==="dark"){ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,cw,ch);ctx.fillStyle=c1+"22";ctx.fillRect(0,0,cw,ch)}
  else if(bStyle==="glass"){const g=ctx.createLinearGradient(0,0,cw,ch);g.addColorStop(0,c1+"88");g.addColorStop(1,c2+"88");ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch);
    ctx.fillStyle="rgba(255,255,255,0.08)";ctx.fillRect(0,0,cw,ch/2)}
  else if(bStyle==="duotone"){ctx.fillStyle=c1;ctx.fillRect(0,0,cw/2,ch);ctx.fillStyle=c2;ctx.fillRect(cw/2,0,cw/2,ch)}
  else{ctx.fillStyle=c1;ctx.fillRect(0,0,cw,ch)}

  // Decorative elements
  ctx.globalAlpha=0.1;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(cw*0.85,ch*0.5,ch*0.8,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

  const isSmall=ch<200;
  const titleSize=isSmall?Math.min(28,ch*0.35):Math.min(60,cw*0.045);

  // Title
  ctx.fillStyle="#fff";ctx.font=`900 ${titleSize}px Manrope,sans-serif`;
  ctx.textAlign=isSmall?"left":"center";
  const tx=isSmall?20:cw/2;
  const ty=isSmall?ch*0.55:ch*0.4;
  ctx.fillText(titleText,tx,ty);

  // Subtitle
  if(sub&&!isSmall){ctx.fillStyle="rgba(255,255,255,0.75)";ctx.font=`400 ${titleSize*0.38}px Manrope,sans-serif`;ctx.fillText(sub,cw/2,ty+titleSize*0.7)}

  // CTA
  if(!isSmall){
    const ctaBW=Math.min(200,cw*0.2),ctaBH=40;
    ctx.fillStyle="#fff";roundRect(ctx,cw/2-ctaBW/2,ch*0.7,ctaBW,ctaBH,20);ctx.fill();
    ctx.fillStyle=c1;ctx.font=`700 ${titleSize*0.28}px Manrope,sans-serif`;ctx.textAlign="center";
    ctx.fillText(cta,cw/2,ch*0.7+26);
  }

  // Watermark
  ctx.fillStyle="rgba(255,255,255,0.15)";ctx.font="10px Manrope,sans-serif";ctx.textAlign="right";ctx.fillText("ALPis",cw-10,ch-8);

  const dataUrl=canvas.toDataURL("image/png");
  document.getElementById("banPreview").innerHTML=`
    <div style="border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3)">
      <img src="${dataUrl}" style="width:100%;display:block">
    </div>
    <div style="margin-top:6px;font-size:10px;font-family:var(--mono);color:var(--t4);text-align:center">${dim}px</div>
    <div class="row" style="margin-top:10px;justify-content:center">
      <button class="btn btn-blue" onclick="dlCanvas('${dataUrl}','alpis-banner-${dim}.png')">↓ Descarcă Banner</button>
    </div>`;
  toast("Banner generat!");
}

function generatePrez(){
  const mainTitle=document.getElementById("prezTitle").value.trim()||"Prezentare";
  const author=document.getElementById("prezAuthor").value.trim();
  const c1=document.getElementById("prezC1").value;
  const c2=document.getElementById("prezC2").value;
  const thEl=document.querySelector('#prezTheme .chip.on');
  const theme=thEl?thEl.dataset.prezth:"dark";

  const titles=[...document.querySelectorAll('.prez-title')].map(e=>e.value);
  const contents=[...document.querySelectorAll('.prez-content')].map(e=>e.value);
  prezSlides=titles.map((t,i)=>({title:t,content:contents[i]||""}));

  const isDark=theme==="dark"||theme==="creative";
  const bgColor=isDark?c2:(theme==="light"?"#fafafa":"#fff");
  const textColor=isDark?"#fff":"#111";
  const accentColor=c1;

  // Generate all slides as canvas images
  const allSlides=[{title:mainTitle,content:author,isCover:true},...prezSlides];
  let slideImgs=[];

  allSlides.forEach((sl,idx)=>{
    const canvas=document.createElement("canvas");canvas.width=1920;canvas.height=1080;
    const ctx=canvas.getContext("2d");

    // Background
    if(isDark){const g=ctx.createLinearGradient(0,0,1920,1080);g.addColorStop(0,c2);g.addColorStop(1,adjustColor(c2,-15));ctx.fillStyle=g}
    else ctx.fillStyle=bgColor;
    ctx.fillRect(0,0,1920,1080);

    // Accent bar
    ctx.fillStyle=accentColor;
    if(sl.isCover){ctx.fillRect(0,0,12,1080);ctx.fillRect(0,1060,1920,20)}
    else{ctx.fillRect(0,0,8,1080);ctx.fillRect(0,0,1920,4)}

    // Decorative circle
    ctx.globalAlpha=0.06;ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(1600,800,400,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    if(sl.isCover){
      // Cover slide
      ctx.fillStyle=textColor;ctx.font="900 72px Manrope,sans-serif";ctx.textAlign="left";
      const cLines=wrapText(ctx,sl.title,1400);
      cLines.forEach((line,i)=>ctx.fillText(line,100,380+i*90));

      if(sl.content){ctx.fillStyle=isDark?"rgba(255,255,255,0.5)":"#777";ctx.font="400 28px Manrope,sans-serif";
        ctx.fillText(sl.content,100,380+cLines.length*90+50)}

      // Slide number
      ctx.fillStyle=accentColor;ctx.font="700 18px 'DM Mono',monospace";ctx.textAlign="right";
      ctx.fillText("ALPis Presentation",1820,1030);
    } else {
      // Content slide
      ctx.fillStyle=accentColor;ctx.font="700 20px 'DM Mono',monospace";ctx.textAlign="left";ctx.fillText(`SLIDE ${idx}`,100,70);

      ctx.fillStyle=textColor;ctx.font="800 48px Manrope,sans-serif";
      ctx.fillText(sl.title||`Slide ${idx}`,100,160);

      // Content as bullet points
      if(sl.content){
        const bullets=sl.content.split("\n").filter(Boolean);
        ctx.font="400 26px Manrope,sans-serif";ctx.fillStyle=isDark?"rgba(255,255,255,0.7)":"#555";
        bullets.forEach((b,bi)=>{
          const bullet=b.startsWith("-")||b.startsWith("•")?b:`• ${b}`;
          const bLines=wrapText(ctx,bullet,1500);
          bLines.forEach((line,li)=>ctx.fillText(line,120,280+bi*55+li*32));
        });
      }

      // Page number
      ctx.fillStyle=isDark?"rgba(255,255,255,0.3)":"#bbb";ctx.font="500 18px 'DM Mono',monospace";ctx.textAlign="right";
      ctx.fillText(`${idx} / ${allSlides.length-1}`,1820,1040);
    }

    slideImgs.push(canvas.toDataURL("image/png"));
  });

  // Show slides in preview
  document.getElementById("prezPreview").innerHTML=`
    <div class="label" style="margin-top:0">Slide-uri generate (${slideImgs.length})</div>
    <div style="display:flex;flex-direction:column;gap:10px;max-height:600px;overflow:auto">
      ${slideImgs.map((img,i)=>`
        <div style="border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3);position:relative">
          <img src="${img}" style="width:100%;display:block">
          <div style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);padding:3px 10px;border-radius:6px;font-size:10px;font-family:var(--mono);color:#fff">${i===0?"Cover":`Slide ${i}`}</div>
        </div>
      `).join("")}
    </div>
    <div class="row" style="margin-top:12px;justify-content:center;flex-wrap:wrap;gap:6px">
      ${slideImgs.map((img,i)=>`<button class="btn btn-sm btn-sec" onclick="dlCanvas('${img}','alpis-slide-${i}.png')">↓ Slide ${i===0?"Cover":i}</button>`).join("")}
      <button class="btn btn-primary" onclick="${slideImgs.map((img,i)=>`dlCanvas('${img}','alpis-slide-${i}.png');`).join("")}">↓ Descarcă Toate</button>
    </div>`;
  toast("Prezentare generată!");
}

function applyWatermark(){
  if(!wmImg){toast(LANG==="en"?"Upload an image first!":"Încarcă o imagine întâi!");return;}

  const wmText=document.getElementById("wmText")?.value||"ALPis Studio";
  const wmSize=+(document.getElementById("wmSize")?.value||36);
  const wmColor=document.getElementById("wmColor")?.value||"#ffffff";
  const wmOpacity=+(document.getElementById("wmOpacity")?.value||25)/100;
  const posEl=document.querySelector('[data-wmpos].on');
  const wmPos=posEl?posEl.dataset.wmpos:"bot-right";
  const typeEl=document.querySelector('[data-wmt].on');
  const wmType=typeEl?typeEl.dataset.wmt:"text";

  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");canvas.width=img.width;canvas.height=img.height;
    const ctx=canvas.getContext("2d");
    ctx.drawImage(img,0,0);

    ctx.globalAlpha=wmOpacity;
    const fontSize=wmSize*(img.width/800);

    if(wmType==="logo"){
      const logoFile=document.getElementById("wmLogo")?.files[0];
      if(logoFile){
        const logoReader=new FileReader();
        logoReader.onload=le=>{
          const logoImg=new Image();
          logoImg.onload=()=>{
            const lw=img.width*0.15,lh=lw*(logoImg.height/logoImg.width);
            const [lx,ly]=getWmXY(wmPos,img.width,img.height,lw,lh);
            ctx.drawImage(logoImg,lx,ly,lw,lh);
            ctx.globalAlpha=1;
            finishWm(canvas);
          };logoImg.src=le.target.result;
        };logoReader.readAsDataURL(logoFile);
        return;
      }
    }

    // Text watermark
    ctx.fillStyle=wmColor;
    ctx.font=`bold ${fontSize}px Manrope,sans-serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";

    if(wmPos==="tile"||wmPos==="repeat"){
      ctx.rotate(-25*Math.PI/180);
      for(let y=-img.height;y<img.height*2;y+=fontSize*3){
        for(let x=-img.width;x<img.width*2;x+=ctx.measureText(wmText).width+fontSize*2){
          ctx.fillText(wmText,x,y);
        }
      }
      ctx.setTransform(1,0,0,1,0,0);
    } else if(wmPos==="diagonal"){
      ctx.save();ctx.translate(img.width/2,img.height/2);ctx.rotate(-30*Math.PI/180);
      ctx.font=`bold ${fontSize*1.5}px Manrope,sans-serif`;
      ctx.fillText(wmText,0,0);ctx.restore();
    } else {
      const [tx,ty]=getWmXY(wmPos,img.width,img.height,0,0);
      ctx.fillText(wmText,tx,ty);
    }

    ctx.globalAlpha=1;
    finishWm(canvas);
  };
  img.src=wmImg;
}

function getWmXY(pos,w,h,ew,eh){
  const pad=w*0.04;
  const map={
    "top-left":[pad+ew/2,pad+eh/2],"top-center":[w/2,pad+eh/2],"top-right":[w-pad-ew/2,pad+eh/2],
    "mid-left":[pad+ew/2,h/2],"center":[w/2,h/2],"mid-right":[w-pad-ew/2,h/2],
    "bot-left":[pad+ew/2,h-pad-eh/2],"bot-center":[w/2,h-pad-eh/2],"bot-right":[w-pad-ew/2,h-pad-eh/2]
  };
  return map[pos]||map["bot-right"];
}

function finishWm(canvas){
  const dataUrl=canvas.toDataURL("image/png");
  document.getElementById("wmPreview").innerHTML=`
    <img src="${dataUrl}" style="max-width:100%;border-radius:14px">
    <div class="row" style="margin-top:10px;justify-content:center">
      <button class="btn btn-primary" onclick="dlCanvas('${dataUrl}','alpis-watermarked.png')">↓ ${t("download")}</button>
    </div>`;
  toast(LANG==="en"?"Watermark applied!":"Watermark aplicat!");
}

        </div>
      </div>
    </div>`;
  }

  // Estimated growth
  const monthlyGrowth=tier==="starter"?15:tier==="growing"?8:tier==="established"?4:2;
  const est3m=Math.round(followers*(1+monthlyGrowth/100)**3);

    </div>

    <div class="card mb12" style="border-left:3px solid var(--green)">
      <div class="label" style="margin-top:0">🎯 ${LANG==="en"?"PERSONALIZED STRATEGY":"STRATEGIE PERSONALIZATĂ"} — ${goal.toUpperCase()}</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
        ${tips.map(tip=>`<div style="font-size:12px;color:var(--t2);line-height:1.5;padding:6px 0;border-bottom:1px solid var(--border)">${tip}</div>`).join("")}

function calcAnalytics(){
  const f=+document.getElementById("anFollowers").value||1;
  const l=+document.getElementById("anLikes").value||0;
  const c=+document.getElementById("anComments").value||0;
  const sh=+document.getElementById("anShares").value||0;
  const sv=+document.getElementById("anSaves").value||0;
  const pp=+document.getElementById("anPosts").value||1;
  const plat=document.getElementById("anPlat").value;
  const engagement=((l+c+sh+sv)/f*100).toFixed(2);
  const eLabel=engagement>6?"🔥 "+(LANG==="en"?"Excellent":"Excelent"):engagement>3?"✅ "+(LANG==="en"?"Good":"Bun"):engagement>1?"⚠️ "+(LANG==="en"?"Average":"Mediu"):"❌ "+(LANG==="en"?"Low":"Scăzut");
  const eColor=engagement>6?"var(--green)":engagement>3?"var(--blue)":engagement>1?"var(--yellow)":"#ff2d55";
  const bestTimes={instagram:"18:00-21:00",tiktok:"19:00-23:00",twitter:"12:00-15:00",linkedin:"08:00-10:00",facebook:"13:00-16:00",youtube:"14:00-17:00"};
  const bestDays={instagram:LANG==="en"?"Tue, Wed, Thu":"Mar, Mie, Joi",tiktok:LANG==="en"?"Tue, Thu, Fri":"Mar, Joi, Vin",twitter:LANG==="en"?"Mon, Wed":"Lun, Mie",linkedin:LANG==="en"?"Tue, Wed, Thu":"Mar, Mie, Joi",facebook:LANG==="en"?"Wed, Thu, Fri":"Mie, Joi, Vin",youtube:LANG==="en"?"Thu, Fri, Sat":"Joi, Vin, Sâm"};
  const monthlyReach=Math.round(f*engagement/100*pp*4*2.5);
  document.getElementById("anResults").innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="info-box" style="border-top:3px solid ${eColor}"><div class="val" style="color:${eColor};font-size:24px">${engagement}%</div><div class="lbl">${LANG==="en"?"Engagement Rate":"Rată Engagement"}</div><div style="font-size:10px;color:${eColor};margin-top:2px">${eLabel}</div></div>
      <div class="info-box" style="border-top:3px solid var(--purple)"><div class="val" style="color:var(--purple)">${monthlyReach.toLocaleString()}</div><div class="lbl">${LANG==="en"?"Est. Monthly Reach":"Reach Lunar Est."}</div></div>
      <div class="info-box"><div class="val">${(l/f*100).toFixed(1)}%</div><div class="lbl">${LANG==="en"?"Like Rate":"Rată Like"}</div></div>
      <div class="info-box"><div class="val">${(sv/f*100).toFixed(1)}%</div><div class="lbl">${LANG==="en"?"Save Rate":"Rată Salvări"}</div></div>
    </div>
    <div class="card mb12" style="border-left:3px solid var(--blue)">
      <div class="label" style="margin-top:0">⏰ ${LANG==="en"?"BEST POSTING TIMES":"ORE OPTIME POSTARE"} — ${PLATFORMS[plat].name}</div>
      <div style="font-size:13px;color:var(--t2)"><b>${LANG==="en"?"Hours":"Ore"}:</b> ${bestTimes[plat]||"18:00-21:00"}<br><b>${LANG==="en"?"Best Days":"Zile optime"}:</b> ${bestDays[plat]||"Mie, Joi"}</div>
    </div>
    <div class="card" style="border-left:3px solid var(--green)">
      <div class="label" style="margin-top:0">💡 ${LANG==="en"?"RECOMMENDATIONS":"RECOMANDĂRI"}</div>
      <div style="font-size:12px;color:var(--t3);line-height:1.7">${engagement<3?(LANG==="en"?"Focus on saves & shares — they signal quality content to the algorithm. Try carousel posts and educational content.":"Focusează-te pe salvări & share-uri — semnalizează conținut de calitate algoritmului. Încearcă carousel-uri și conținut educativ."):(LANG==="en"?"Great engagement! Now focus on reach: use trending audio, collaborate with creators, and experiment with new formats.":"Engagement excelent! Acum focusează-te pe reach: folosește audio trending, colaborează cu creatori, experimentează formate noi.")}</div>
    </div>`;
  toast(t("generated"));
}

function loadMockImg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{mockImg=ev.target.result};r.readAsDataURL(f);toast(LANG==="en"?"Image loaded!":"Imagine încărcată!")}
function generateMockup(){
  if(!mockImg){toast(LANG==="en"?"Upload a design first!":"Încarcă un design întâi!");return}
  const typeEl=document.querySelector('[data-mock].on');const type=typeEl?typeEl.dataset.mock:"phone";
  const bg=document.getElementById("mockBg").value;
  const canvas=document.createElement("canvas");canvas.width=1200;canvas.height=900;
  const ctx=canvas.getContext("2d");
  ctx.fillStyle=bg;ctx.fillRect(0,0,1200,900);
  const img=new Image();img.onload=()=>{
    const configs={phone:{dx:440,dy:80,dw:320,dh:640,rx:20,frame:"#222",fw:16},laptop:{dx:250,dy:100,dw:700,dh:440,rx:10,frame:"#333",fw:20},
      tablet:{dx:330,dy:60,dw:540,dh:720,rx:16,frame:"#222",fw:14},tshirt:{dx:400,dy:200,dw:400,dh:400,rx:0,frame:null,fw:0},
      mug:{dx:420,dy:200,dw:360,dh:400,rx:30,frame:"#ddd",fw:8},frame:{dx:300,dy:80,dw:600,dh:700,rx:0,frame:"#8B4513",fw:20},
      billboard:{dx:100,dy:100,dw:1000,dh:600,rx:8,frame:"#555",fw:12},card:{dx:350,dy:200,dw:500,dh:300,rx:14,frame:"#333",fw:4}};
    const c=configs[type]||configs.phone;
    // Device frame
    if(c.frame){ctx.fillStyle=c.frame;roundRect(ctx,c.dx-c.fw,c.dy-c.fw,c.dw+c.fw*2,c.dh+c.fw*2,c.rx+c.fw/2);ctx.fill()}
    // Image
    ctx.save();if(c.rx){roundRect(ctx,c.dx,c.dy,c.dw,c.dh,c.rx);ctx.clip()}
    ctx.drawImage(img,c.dx,c.dy,c.dw,c.dh);ctx.restore();
    // Shadow
    ctx.globalAlpha=0.15;ctx.fillStyle="#000";ctx.fillRect(c.dx+10,c.dy+c.dh+c.fw,c.dw-20,20);ctx.globalAlpha=1;
    const dataUrl=canvas.toDataURL("image/png");
    document.getElementById("mockPreview").innerHTML=`<div style="border-radius:14px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.3)"><img src="${dataUrl}" style="width:100%;display:block"></div>
      <div class="row" style="margin-top:10px;justify-content:center"><button class="btn btn-primary" onclick="dlCanvas('${dataUrl}','alpis-mockup.png')">↓ ${t("download")}</button></div>`;
    toast(t("generated"));
  };img.src=mockImg;
}

function genChatbot(){

let rszImg=null;
function renderResizer(){
  return title("📐","#f97316","Image Resizer",LANG==="en"?"Batch resize for all platforms at once":"Redimensionare batch pentru toate platformele")+`
  <div class="mb20">
    <div style="padding:30px;border-radius:14px;border:2px dashed rgba(249,115,22,0.2);background:rgba(249,115,22,0.02);text-align:center;cursor:pointer;margin-bottom:16px" onclick="document.getElementById('rszFile').click()">
      <div style="font-size:32px;opacity:0.3">📐</div><div style="font-size:12px;color:var(--t3)">${LANG==="en"?"Click to upload image":"Click pentru a încărca"}</div>
      <input type="file" id="rszFile" accept="image/*" style="display:none" onchange="loadRszImg(event)">
    </div>
    <button class="btn btn-primary mb16" onclick="batchResize()">📐 ${LANG==="en"?"Resize for All Platforms":"Redimensionează pentru Toate"}</button>
    <div id="rszResults"></div>
  </div>`;
}
function loadRszImg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{rszImg=ev.target.result;toast(LANG==="en"?"Image loaded!":"Imagine încărcată!")};r.readAsDataURL(f)}
function batchResize(){
  if(!rszImg){toast(LANG==="en"?"Upload an image!":"Încarcă o imagine!");return}
  const sizes=[{name:"Instagram Post",w:1080,h:1080},{name:"Instagram Story",w:1080,h:1920},{name:"Facebook",w:1200,h:630},{name:"Twitter",w:1200,h:675},{name:"LinkedIn",w:1200,h:627},{name:"YouTube",w:1280,h:720},{name:"Pinterest",w:1000,h:1500},{name:"TikTok",w:1080,h:1920}];
  const img=new Image();img.onload=()=>{
    let html='<div class="grid3">';
    sizes.forEach(s=>{
      const c=document.createElement("canvas");c.width=s.w;c.height=s.h;const ctx=c.getContext("2d");
      const scale=Math.max(s.w/img.width,s.h/img.height);
      const sw=img.width*scale,sh=img.height*scale;
      ctx.drawImage(img,(s.w-sw)/2,(s.h-sh)/2,sw,sh);
      const url=c.toDataURL("image/png");
      html+=`<div class="card" style="text-align:center;padding:10px">
        <img src="${url}" style="width:100%;border-radius:8px;max-height:150px;object-fit:contain">
        <div style="font-size:11px;font-weight:600;margin-top:6px">${s.name}</div>
        <div style="font-size:9px;color:var(--t4);font-family:var(--mono)">${s.w}×${s.h}</div>
        <button class="btn btn-sm btn-sec" onclick="dlCanvas('${url}','alpis-${s.name.replace(/\s/g,"-").toLowerCase()}.png')" style="margin-top:6px">↓</button>
      </div>`;
    });
    html+='</div>';
    document.getElementById("rszResults").innerHTML=html;
    toast(LANG==="en"?"All sizes generated!":"Toate dimensiunile generate!");
  };img.src=rszImg;
}

  ]:[

function checkScore(total){
  let done=0;for(let i=0;i<total;i++){if(document.getElementById("chk"+i)?.textContent==="✅")done++}

  document.getElementById("checkResult").innerHTML=`<div class="card" style="border-top:3px solid ${color}"><div class="row-sb">
    <span style="font-size:14px;font-weight:700">${done}/${total} ${LANG==="en"?"completed":"completate"}</span>

    <div style="font-size:11px;color:var(--t3);margin-top:6px">${pct===100?(LANG==="en"?"🎉 Ready to publish!":"🎉 Gata de publicare!"):(LANG==="en"?"⚠️ Complete all checks before posting":"⚠️ Completează toate verificările înainte de postare")}</div></div>`;

function translateContent(){
  const src=document.getElementById("trSrc")?.value.trim();
  if(!src){toast(LANG==="en"?"Enter text!":"Introdu text!");return}
  const langs=[...document.querySelectorAll('[data-trl].on')].map(c=>c.dataset.trl);
  if(!langs.length){toast(LANG==="en"?"Select languages!":"Selectează limbi!");return}
  const langNames={en:"English",ro:"Română",de:"Deutsch",fr:"Français",es:"Español",it:"Italiano",pt:"Português",nl:"Nederlands",pl:"Polski",ja:"日本語"};
  const flags={en:"🇬🇧",ro:"🇷🇴",de:"🇩🇪",fr:"🇫🇷",es:"🇪🇸",it:"🇮🇹",pt:"🇧🇷",nl:"🇳🇱",pl:"🇵🇱",ja:"🇯🇵"};
  // Note: Real translation needs an API. We provide the structure + prompt for AI translation
  document.getElementById("trResults").innerHTML=`
    <div class="label" style="margin-top:0">${LANG==="en"?"Translation Prompts":"Prompturi Traducere"}</div>
    ${langs.map(l=>{
      const prompt=`Translate the following text to ${langNames[l]}. Keep the tone, emojis, and formatting:\n\n"${src}"`;
      return `<div class="card mb8" style="border-left:3px solid var(--cyan)">
        <div class="row-sb mb8"><span style="font-size:12px;font-weight:600">${flags[l]} ${langNames[l]}</span>
        <button class="btn btn-sm btn-sec" onclick="copyText(\`${esc(prompt).replace(/`/g,"\\`")}\`)">◫ ${LANG==="en"?"Copy prompt":"Copiază prompt"}</button></div>
        <div style="font-size:11px;color:var(--t3);font-family:var(--mono);line-height:1.4">${LANG==="en"?"Copy this prompt and paste it into Claude or ChatGPT for accurate translation":"Copiază acest prompt și lipește-l în Claude sau ChatGPT pentru traducere precisă"}</div>
      </div>`;
    }).join("")}
    <div style="margin-top:8px;padding:10px;border-radius:8px;background:rgba(20,184,166,0.04);border:1px solid rgba(20,184,166,0.1)">
      <div style="font-size:10px;color:var(--t4);font-family:var(--mono)">💡 ${LANG==="en"?"TIP":"SFAT"}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:4px">${LANG==="en"?"For best results, translate with AI (Claude/ChatGPT) rather than Google Translate — it preserves tone, cultural nuances and marketing context.":"Pentru cele mai bune rezultate, traduce cu AI (Claude/ChatGPT) în loc de Google Translate — păstrează tonul, nuanțele culturale și contextul de marketing."}</div>
    </div>`;
  toast(t("generated"));
}

function wrapText(ctx,text,maxW){
  const words=text.split(/\s+/);const lines=[];let line="";
  words.forEach(w=>{const test=line?line+" "+w:w;if(ctx.measureText(test).width>maxW){if(line)lines.push(line);line=w}else line=test});
  if(line)lines.push(line);return lines.length?lines:[text];
}

function dlCanvas(dataUrl,filename){
  const a=document.createElement("a");a.download=filename;a.href=dataUrl;a.click();toast("Descărcat!");
}

function adjustColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return"#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}
